name: Multi-Model Custom CV & Cover Letter Generator

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  generate-cv:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        model: [llama3, mistral, phi3, gemma4]

    env:
      MODEL_NAME: ${{ matrix.model }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ollama, Pandoc, LaTeX, pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-full poppler-utils
          curl -fsSL https://ollama.com/install.sh | sh
          sudo systemctl start ollama

      - name: Pull model ${{ env.MODEL_NAME }}
        run: |
          ollama pull "${MODEL_NAME}"

      - name: Prepare workspace and extract CV text
        run: |
          mkdir -p workspace
          pdftotext nonso_cv.pdf workspace/cv.txt
          tr -s '\n' '\n' < workspace/cv.txt > workspace/cv_clean.txt

      - name: Build skill-gap analysis prompt
        run: |
          cat > workspace/skill_gap_prompt.txt << 'EOF'
          You are an expert technical recruiter and career coach.

          ### JOB DESCRIPTION
          EOF
          cat input/input.txt >> workspace/skill_gap_prompt.txt
          cat >> workspace/skill_gap_prompt.txt << 'EOF'

          ### CANDIDATE CV (TEXT)
          EOF
          cat workspace/cv_clean.txt >> workspace/skill_gap_prompt.txt
          cat >> workspace/skill_gap_prompt.txt << 'EOF'

          ### TASK
          1. Extract all required skills and technologies from the job description.
          2. Extract all skills and technologies present in the CV.
          3. Identify which required skills are missing or weakly represented.
          4. Provide a concise "Skill Gap Analysis" in Markdown with the following sections:

          - Required Skills
          - Present Skills
          - Missing or Weak Skills
          - Recommendations

          Output ONLY valid Markdown. Do not include any other commentary.
          EOF

      - name: Run skill-gap analysis with ${{ env.MODEL_NAME }}
        run: |
          ollama run "${MODEL_NAME}" < workspace/skill_gap_prompt.txt > workspace/skill_gap_${MODEL_NAME}.md

      - name: Build CV generation prompt
        run: |
          cat > workspace/cv_prompt.txt << 'EOF'
          You are an expert CV writer for senior Cloud & DevOps roles.

          ### JOB DESCRIPTION
          EOF
          cat input/input.txt >> workspace/cv_prompt.txt
          cat >> workspace/cv_prompt.txt << 'EOF'

          ### EXISTING CV (TEXT)
          EOF
          cat workspace/cv_clean.txt >> workspace/cv_prompt.txt
          cat >> workspace/cv_prompt.txt << 'EOF'

          ### TASK
          Rewrite the CV so that it is strongly aligned with the job description while remaining truthful to the candidate's experience.

          Requirements:
          - Output a modern, ATS-friendly CV in **Markdown**.
          - Use clear section headings such as: Summary, Skills, Experience, Education, Certifications, Projects.
          - Emphasise Azure, DevOps, Kubernetes, Terraform, CI/CD, and platform engineering where appropriate.
          - Do NOT include any explanation or commentary—ONLY the final CV in Markdown.
          EOF

      - name: Generate customised CV (Markdown) with ${{ env.MODEL_NAME }}
        run: |
          ollama run "${MODEL_NAME}" < workspace/cv_prompt.txt > workspace/cv_${MODEL_NAME}.md

      - name: Build cover letter prompt
        run: |
          cat > workspace/cover_letter_prompt.txt << 'EOF'
          You are an expert in writing concise, high-impact cover letters for senior Cloud & DevOps roles.

          ### JOB DESCRIPTION
          EOF
          cat input/input.txt >> workspace/cover_letter_prompt.txt
          cat >> workspace/cover_letter_prompt.txt << 'EOF'

          ### CANDIDATE CV (TEXT)
          EOF
          cat workspace/cv_clean.txt >> workspace/cover_letter_prompt.txt
          cat >> workspace/cover_letter_prompt.txt << 'EOF'

          ### TASK
          Write a tailored cover letter for this role.

          Requirements:
          - Address the letter generically (e.g., "Dear Hiring Manager").
          - 3–5 short paragraphs.
          - Clearly connect the candidate's experience to the job requirements.
          - Highlight Azure, DevOps, Kubernetes, Terraform, CI/CD, and platform engineering where relevant.
          - Confident but not arrogant tone.
          - Output ONLY the cover letter in **Markdown**.
          EOF

      - name: Generate cover letter (Markdown) with ${{ env.MODEL_NAME }}
        run: |
          ollama run "${MODEL_NAME}" < workspace/cover_letter_prompt.txt > workspace/cover_letter_${MODEL_NAME}.md

      - name: Convert Markdown CV and cover letter to PDF
        run: |
         mkdir -p workspace/pdf

          # Clean Markdown files (Removed literal newlines in sed commands)
          sed -i 's/\x1b\[[0-9;]*[A-Za-z]//g' workspace/cv_${MODEL_NAME}.md
          sed -i 's/\x1b\[[0-9;]*[A-Za-z]//g' workspace/cover_letter_${MODEL_NAME}.md

          tr -cd '\11\12\15\40-\176' < workspace/cv_${MODEL_NAME}.md > workspace/cv_${MODEL_NAME}_clean.md
          tr -cd '\11\12\15\40-\176' < workspace/cover_letter_${MODEL_NAME}.md > workspace/cover_letter_${MODEL_NAME}_clean.md

          mv workspace/cv_${MODEL_NAME}_clean.md workspace/cv_${MODEL_NAME}.md
          mv workspace/cover_letter_${MODEL_NAME}_clean.md workspace/cover_letter_${MODEL_NAME}.md

          # Convert to PDF
          pandoc workspace/cv_${MODEL_NAME}.md -o workspace/pdf/cv_${MODEL_NAME}.pdf --pdf-engine=xelatex
          pandoc workspace/cover_letter_${MODEL_NAME}.md -o workspace/pdf/cover_letter_${MODEL_NAME}.pdf --pdf-engine=xelatex 

      - name: Upload artifacts for model ${{ env.MODEL_NAME }}
        uses: actions/upload-artifact@v4
        with:
          name: application-package-${{ env.MODEL_NAME }}
          path: |
            workspace/skill_gap_${{ env.MODEL_NAME }}.md
            workspace/cv_${{ env.MODEL_NAME }}.md
            workspace/cover_letter_${{ env.MODEL_NAME }}.md
            workspace/pdf/cv_${{ env.MODEL_NAME }}.pdf
            workspace/pdf/cover_letter_${{ env.MODEL_NAME }}.pdf
